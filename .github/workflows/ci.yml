name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: search-engine-web/package-lock.json

      - name: Backend build
        run: mvn test

      - name: Frontend install
        working-directory: search-engine-web
        run: npm ci

      - name: Frontend build
        working-directory: search-engine-web
        run: npm run build
